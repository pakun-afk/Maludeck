name: Build Sync XxX APK New

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract Base Project
        run: |
          # Extract semua zip yang ada
          for zip in base.zip; do
            unzip -o "$zip" -d temp
          done
          # Pindahin isi folder android ke root (kalo ada)
          if [ -d "temp/android" ]; then
            cp -r temp/* .
          else
            cp -r temp/*/* . 2>/dev/null || cp -r temp/* .
          fi
          ls -la  # Cek struktur

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pillow
        run: pip install Pillow

      - name: Generate App Icons
        run: |
          # Cari generate_icons.py di mana
          if [ -f "generate_icons.py" ]; then
            python3 generate_icons.py
          elif [ -f "android/generate_icons.py" ]; then
            cd android && python3 generate_icons.py && cd ..
          else
            echo "⚠️ generate_icons.py not found, skipping..."
          fi

      - name: Setup Gradle Wrapper
        run: |
          # Cek apakah ada folder android
          if [ -d "android" ]; then
            cd android
          fi
          # Download gradle wrapper kalo ga ada
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            mkdir -p gradle/wrapper
            curl -L -o gradle/wrapper/gradle-wrapper.jar \
              "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar"
          fi
          chmod +x gradlew 2>/dev/null || chmod +x android/gradlew 2>/dev/null

      - name: Build Release APK
        run: |
          if [ -d "android" ]; then
            cd android
          fi
          ./gradlew assembleRelease --no-daemon

      - name: Rename and Upload APK
        run: |
          mkdir -p output
          # Cari APK di berbagai kemungkinan lokasi
          find . -path "*/app/build/outputs/apk/release/*.apk" -o -path "*/android/app/build/outputs/apk/release/*.apk" | head -1 | xargs -I{} cp {} output/SyncXxX.apk 2>/dev/null || echo "APK not found"
          ls -la output/

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SyncXxX-APK
          path: output/SyncXxX.apk
          retention-days: 30
